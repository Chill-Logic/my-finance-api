version: '3.9'
services:
  db:
    image: postgres:15.4
    volumes:
      - ./tmp/db:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - TZ=America/Sao_Paulo
    ports:
      - "${POSTGRES_PORT}:${POSTGRES_PORT}"
    command: -p ${POSTGRES_PORT}
  web:
    build: .
    stdin_open: true
    tty: true
    command: bash -c "rm -f tmp/pids/server.pid && bundle exec rails s -p 3000 -b '0.0.0.0'"
    volumes:
      - .:/my-finance-api
    ports:
      - "${VIRTUAL_PORT}:3000"
    env_file:
      - .env
    depends_on:
      - db
    environment:
      - DOCKERIZED=true
      - LAUNCHY_DRY_RUN=true
      - BROWSER=/dev/null
      - TZ=America/Sao_Paulo
  nginx:
    image: nginx
    env_file:
      - ./.env
    depends_on:
      - web
    expose:
      - ${VIRTUAL_PORT}

networks:
  default:
    name: nginx-proxy