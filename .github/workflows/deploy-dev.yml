name: Deploy dev

on:
  push:
    branches: [dev]

# Nunca roda dois deploys ao mesmo tempo; um push novo espera o anterior acabar.
concurrency:
  group: deploy-dev
  cancel-in-progress: false

env:
  APP_NAME: my-finance-api

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Captura a versão (git)
        run: |
          echo "GIT_COMMIT_HASH=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"
          echo "GIT_COMMIT_DATE=$(git log -1 --format=%ci)" >> "$GITHUB_ENV"
          echo "GIT_BRANCH=${{ github.ref_name }}" >> "$GITHUB_ENV"

      - name: Instala o cloudflared
        run: |
          sudo curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o /usr/local/bin/cloudflared
          sudo chmod +x /usr/local/bin/cloudflared

      - name: Configura o SSH (via Cloudflare Access)
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          cat >> ~/.ssh/config <<CONFIG
          Host deploy
            HostName $REMOTE_HOST
            User $REMOTE_USER
            IdentityFile ~/.ssh/id_deploy
            StrictHostKeyChecking accept-new
            ProxyCommand cloudflared access ssh --hostname %h
            ControlMaster auto
            ControlPath ~/.ssh/cm-%r@%h
            ControlPersist 2m
          CONFIG

      - name: Envia os arquivos (rsync)
        run: |
          rsync -az --delete --relative \
            --exclude '.bundle' \
            --exclude 'log/*' \
            --exclude 'tmp/*' \
            --exclude 'storage/*' \
            --exclude 'coverage' \
            --exclude '.git/*' \
            --exclude '.env' \
            ./ deploy:~/${APP_NAME}

      - name: Atualiza o .env, bundle, migrations e restart
        env:
          ENV_FILE: ${{ secrets.ENV_FILE_DEV }}
        run: |
          # Escreve o .env do secret e anexa a versão do git (lida pela API em /v1/core/version).
          {
            printf '%s\n' "$ENV_FILE"
            printf 'GIT_COMMIT_HASH=%s\n' "$GIT_COMMIT_HASH"
            printf 'GIT_COMMIT_DATE=%s\n' "$GIT_COMMIT_DATE"
            printf 'GIT_BRANCH=%s\n' "$GIT_BRANCH"
          } | ssh deploy "cat > ~/${APP_NAME}/.env && bash -lc '~/${APP_NAME}/bin/deploy_server.sh ${APP_NAME}'"

      - name: Notifica o Discord
        if: success() && env.DISCORD_WEBHOOK != ''
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_DEPLOYS }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%s 2>/dev/null || echo "N/A")
          curl -s -H "Content-Type: application/json" -d "{
            \"embeds\": [{
              \"title\": \"Deploy concluído com sucesso\",
              \"color\": 5763719,
              \"url\": \"${RUN_URL}\",
              \"fields\": [
                {\"name\": \"Projeto\", \"value\": \"${APP_NAME}\", \"inline\": true},
                {\"name\": \"Ambiente\", \"value\": \"Dev\", \"inline\": true},
                {\"name\": \"Branch\", \"value\": \"${{ github.ref_name }}\", \"inline\": true},
                {\"name\": \"Commit\", \"value\": \"${GIT_COMMIT_HASH} - ${COMMIT_MSG}\", \"inline\": false},
                {\"name\": \"Disparado por\", \"value\": \"${{ github.actor }}\", \"inline\": true}
              ],
              \"footer\": {\"text\": \"GitHub Actions\"},
              \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
            }]
          }" "$DISCORD_WEBHOOK"
