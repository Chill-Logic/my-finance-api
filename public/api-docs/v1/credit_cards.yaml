openapi: "3.0.3"

info:
  title: My Finance API — Credit Cards
  version: "1.0.0"
  description: |
    API REST do My Finance.
    ## Autenticação
    X-API-Key: <token> + Authorization: Bearer <token>

servers:
  - url: /v1
    description: Backend atual (mesma origem desta documentação)

tags:
  - name: Credit Cards
    description: Cartões de um saldo de crédito. Vários cartões compartilham o mesmo limite (`CreditBalance`).

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

  schemas:
    CreditCard:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: "Físico"
        last_digits:
          type: string
          nullable: true
          example: "1234"
        credit_balance_id:
          type: string
          format: uuid
        discarded_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreditCardInput:
      type: object
      required: [credit_card]
      properties:
        credit_card:
          type: object
          required: [name]
          properties:
            name:
              type: string
              example: "Virtual"
            last_digits:
              type: string
              example: "5678"

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: "Mensagem de erro"

    MessageResponse:
      type: object
      properties:
        message:
          type: string
          example: "Operação realizada com sucesso!"

security:
  - bearerAuth: []
    apiKeyAuth: []

paths:

  /credit_cards:
    get:
      tags: [Credit Cards]
      summary: Listar cartões de um saldo de crédito
      parameters:
        - name: credit_balance_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: terms
          in: query
          required: false
          schema:
            type: string
          description: Busca textual por nome (insensível a acentos)
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          required: false
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Lista paginada de cartões
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/CreditCard"
                  total_count:
                    type: integer
                  total_pages:
                    type: integer
        "422":
          description: Saldo de crédito não encontrado (não enviado, inexistente ou sem acesso)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags: [Credit Cards]
      summary: Criar cartão
      description: Cria um cartão num saldo de crédito (`credit_balance_id` na query ou dentro de `credit_card`).
      parameters:
        - name: credit_balance_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Saldo de crédito alvo (alternativa a enviar dentro de `credit_card`)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreditCardInput"
      responses:
        "201":
          description: Cartão criado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/CreditCard"
        "422":
          description: Saldo de crédito não encontrado ou dados inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /credit_cards/{id}:
    get:
      tags: [Credit Cards]
      summary: Obter cartão
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Dados do cartão
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/CreditCard"
        "422":
          description: Cartão não encontrado (inexistente ou sem acesso)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      tags: [Credit Cards]
      summary: Atualizar cartão
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreditCardInput"
      responses:
        "200":
          description: Cartão atualizado
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/CreditCard"
        "422":
          description: Cartão não encontrado ou dados inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags: [Credit Cards]
      summary: Remover cartão (soft delete)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Cartão removido com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "422":
          description: Cartão não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
