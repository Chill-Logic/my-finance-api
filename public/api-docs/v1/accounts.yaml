openapi: "3.0.3"

info:
  title: My Finance API — Accounts
  version: "1.0.0"
  description: |
    API REST do My Finance.
    ## Autenticação
    X-API-Key: <token> + Authorization: Bearer <token>

servers:
  - url: /v1
    description: Backend atual (mesma origem desta documentação)

tags:
  - name: Accounts
    description: Contas de uma carteira (banco ou carteira física). O saldo é derivado das transações efetivadas.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

  schemas:
    Account:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: "Nubank"
        kind:
          type: string
          enum: [checking, savings, cash]
        translated_kind:
          type: string
          description: Label traduzido do enum `kind`
          example: "Dinheiro"
        initial_balance:
          type: integer
          description: Saldo de abertura em centavos
          example: 0
        balance:
          type: integer
          description: Saldo efetivado (initial_balance + depósitos - saques efetivados), em centavos
          example: 475000
        wallet_id:
          type: string
          format: uuid
        discarded_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AccountInput:
      type: object
      required: [account]
      properties:
        account:
          type: object
          required: [name]
          properties:
            name:
              type: string
              example: "Inter"
            kind:
              type: string
              enum: [checking, savings, cash]
            initial_balance:
              type: integer
              description: Saldo de abertura em centavos
              example: 10000

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: "Mensagem de erro"

    MessageResponse:
      type: object
      properties:
        message:
          type: string
          example: "Operação realizada com sucesso!"

security:
  - bearerAuth: []
    apiKeyAuth: []

paths:

  /accounts:
    get:
      tags: [Accounts]
      summary: Listar contas de uma carteira
      description: Retorna as contas da carteira paginadas, cada uma com seu saldo efetivado.
      parameters:
        - name: wallet_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: terms
          in: query
          required: false
          schema:
            type: string
          description: Busca textual por nome (insensível a acentos)
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          required: false
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Lista paginada de contas
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Account"
                  total_count:
                    type: integer
                  total_pages:
                    type: integer
        "422":
          description: Carteira não encontrada (não enviada, inexistente ou sem acesso)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags: [Accounts]
      summary: Criar conta
      description: Cria uma conta na carteira (`wallet_id` na query ou dentro de `account`).
      parameters:
        - name: wallet_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Carteira alvo (alternativa a enviar dentro de `account`)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountInput"
      responses:
        "201":
          description: Conta criada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Account"
        "422":
          description: Carteira não encontrada ou dados inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /accounts/{id}:
    get:
      tags: [Accounts]
      summary: Obter conta
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Dados da conta
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Account"
        "422":
          description: Conta não encontrada (inexistente ou sem acesso)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      tags: [Accounts]
      summary: Atualizar conta
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountInput"
      responses:
        "200":
          description: Conta atualizada
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Account"
        "422":
          description: Conta não encontrada ou dados inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags: [Accounts]
      summary: Remover conta (soft delete)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Conta removida com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "422":
          description: Conta não encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
