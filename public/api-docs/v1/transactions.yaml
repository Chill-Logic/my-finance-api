openapi: "3.0.3"

info:
  title: My Finance API — Transactions
  version: "1.0.0"
  description: |
    API REST do My Finance.
    ## Autenticação
    X-API-Key: <token> + Authorization: Bearer <token>

servers:
  - url: /v1
    description: Backend atual (mesma origem desta documentação)

tags:
  - name: Transactions
    description: Transações de uma carteira — depósitos e saques, valores em centavos

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

  schemas:
    Transaction:
      type: object
      properties:
        id:
          type: string
          format: uuid
        description:
          type: string
          example: "Salário"
        value:
          type: integer
          description: Valor em centavos
          example: 500000
        kind:
          type: string
          enum: [deposit, withdraw]
        translated_kind:
          type: string
          description: Label traduzido do enum `kind`
          example: "Depósito"
        transaction_date:
          type: string
          format: date-time
        wallet_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        user_name:
          type: string
          description: Nome do usuário que registrou a transação
          example: "Gabriel"
        discarded_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TransactionInput:
      type: object
      required: [transaction]
      properties:
        transaction:
          type: object
          properties:
            description:
              type: string
              example: "Mercado"
            value:
              type: integer
              description: Valor em centavos
              example: 35000
            kind:
              type: string
              enum: [deposit, withdraw]
            transaction_date:
              type: string
              format: date-time
              description: Aceita data simples (ex - "2026-07-06"), interpretada como meia-noite no fuso da aplicação (Brasília)
            wallet_id:
              type: string
              format: uuid
              description: Obrigatório no create; ignorado no update

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: "Mensagem de erro"

    MessageResponse:
      type: object
      properties:
        message:
          type: string
          example: "Operação realizada com sucesso!"

security:
  - bearerAuth: []
    apiKeyAuth: []

paths:

  /transactions:
    get:
      tags: [Transactions]
      summary: Listar transações de uma carteira
      description: Retorna as transações da carteira paginadas (ordenadas por data decrescente) e o saldo do período filtrado em `total`. Datas não parseáveis em `start_date`/`end_date` são ignoradas.
      parameters:
        - name: wallet_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: start_date
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: end_date
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: timezone
          in: query
          required: false
          schema:
            type: string
          example: America/New_York
          description: Timezone (nome IANA) usado para os limites de dia de `start_date`/`end_date`. Ausente ou inválido usa o fuso da aplicação (Brasília).
        - name: terms
          in: query
          required: false
          schema:
            type: string
          description: Busca textual por descrição (insensível a acentos)
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          required: false
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Lista paginada de transações com o saldo do período
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Transaction"
                  total_count:
                    type: integer
                  total_pages:
                    type: integer
                  total:
                    type: integer
                    description: Saldo do período em centavos (depósitos - saques)
        "422":
          description: Carteira não encontrada (não enviada, inexistente ou sem acesso)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags: [Transactions]
      summary: Criar transação
      description: Cria uma transação na carteira (`wallet_id` dentro de `transaction`), vinculada ao usuário autenticado.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionInput"
            example:
              transaction:
                description: "Aluguel"
                value: 150000
                kind: withdraw
                transaction_date: "2026-07-06"
                wallet_id: "00000000-0000-0000-0000-000000000000"
      responses:
        "201":
          description: Transação criada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Transaction"
        "422":
          description: Carteira não encontrada ou dados inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /transactions/{id}:
    get:
      tags: [Transactions]
      summary: Obter transação
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Dados da transação
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Transaction"
        "422":
          description: Transação não encontrada (inexistente ou de carteira sem acesso)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      tags: [Transactions]
      summary: Atualizar transação
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionInput"
      responses:
        "200":
          description: Transação atualizada
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Transaction"
        "422":
          description: Transação não encontrada ou dados inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags: [Transactions]
      summary: Remover transação (soft delete)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Transação removida com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "422":
          description: Transação não encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
