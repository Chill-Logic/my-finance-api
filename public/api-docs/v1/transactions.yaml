openapi: "3.0.3"

info:
  title: My Finance API — Transactions
  version: "1.0.0"
  description: |
    API REST do My Finance.
    ## Autenticação
    X-API-Key: <token> + Authorization: Bearer <token>

servers:
  - url: /v1
    description: Backend atual (mesma origem desta documentação)

tags:
  - name: Transactions
    description: Transações de uma carteira — depósitos e saques, valores em centavos

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

  schemas:
    Transaction:
      type: object
      properties:
        id:
          type: string
          format: uuid
        description:
          type: string
          example: "Salário"
        value:
          type: integer
          description: Valor em centavos
          example: 500000
        kind:
          type: string
          enum: [deposit, withdraw]
        translated_kind:
          type: string
          description: Label traduzido do enum `kind`
          example: "Depósito"
        transaction_date:
          type: string
          format: date-time
        settled_at:
          type: string
          format: date-time
          nullable: true
          description: Efetivado em (recebido/pago). Nulo = pendente.
        draft:
          type: boolean
          description: Rascunho — quando true, é ignorada de todos os totais
        source_type:
          type: string
          enum: [Account, CreditBalance]
          description: Tipo da origem polimórfica
        source_id:
          type: string
          format: uuid
          description: ID da conta ou saldo de crédito de origem
        credit_card_id:
          type: string
          format: uuid
          nullable: true
          description: Cartão do saldo de crédito (só quando a origem é um CreditBalance)
        paid_credit_balance_id:
          type: string
          format: uuid
          nullable: true
          description: Preenchido quando o saque é o pagamento da fatura desse saldo de crédito
        wallet_id:
          type: string
          format: uuid
          description: Derivado automaticamente da origem
        user_id:
          type: string
          format: uuid
        user_name:
          type: string
          description: Nome do usuário que registrou a transação
          example: "Gabriel"
        discarded_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TransactionInput:
      type: object
      required: [transaction]
      properties:
        transaction:
          type: object
          properties:
            description:
              type: string
              example: "Mercado"
            value:
              type: integer
              description: Valor em centavos
              example: 35000
            kind:
              type: string
              enum: [deposit, withdraw]
            transaction_date:
              type: string
              format: date-time
              description: Aceita data simples (ex - "2026-07-06"), interpretada como meia-noite no fuso da aplicação (Brasília)
            source_type:
              type: string
              enum: [Account, CreditBalance]
              description: Obrigatório no create — tipo da origem
            source_id:
              type: string
              format: uuid
              description: Obrigatório no create — ID da conta/saldo de crédito. A carteira é derivada dele.
            credit_card_id:
              type: string
              format: uuid
              description: Opcional — cartão do saldo de crédito (deve pertencer ao CreditBalance de origem)
            draft:
              type: boolean
              description: Marca a transação como rascunho (ignorada dos totais)

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: "Mensagem de erro"

    MessageResponse:
      type: object
      properties:
        message:
          type: string
          example: "Operação realizada com sucesso!"

security:
  - bearerAuth: []
    apiKeyAuth: []

paths:

  /transactions:
    get:
      tags: [Transactions]
      summary: Listar transações do mês de uma carteira
      description: >
        Retorna as transações do mês de referência (ordenadas por data decrescente) e dois totais:
        `total_settled` (só efetivadas) e `total_projected` (efetivadas + pendentes). Ambos ignoram
        rascunhos (`draft`). O mês vem de `month`+`year` ou de `reference` ("YYYY-MM"); sem parâmetros,
        usa o mês atual (fuso de Brasília). Rascunhos aparecem na lista, mas ficam fora dos totais.
      parameters:
        - name: wallet_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: month
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 12
          example: 7
        - name: year
          in: query
          required: false
          schema:
            type: integer
          example: 2026
        - name: reference
          in: query
          required: false
          schema:
            type: string
          example: "2026-07"
          description: Mês de referência no formato YYYY-MM (alternativa a month/year)
        - name: source_type
          in: query
          required: false
          schema:
            type: string
            enum: [Account, CreditBalance]
          description: Filtra por origem (junto com source_id)
        - name: source_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: terms
          in: query
          required: false
          schema:
            type: string
          description: Busca textual por descrição (insensível a acentos)
      responses:
        "200":
          description: Lista completa das transações do mês (sem paginação) com os totais efetivado e previsto
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Transaction"
                  total_count:
                    type: integer
                    description: Quantidade de transações do mês
                  total_settled:
                    type: integer
                    description: Saldo efetivado do mês em centavos (só transações com settled_at)
                  total_projected:
                    type: integer
                    description: Saldo previsto do mês em centavos (efetivadas + pendentes)
        "422":
          description: Carteira não encontrada (não enviada, inexistente ou sem acesso)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags: [Transactions]
      summary: Criar transação
      description: Cria uma transação numa origem (`source_type`/`source_id`, uma conta ou saldo de crédito), vinculada ao usuário autenticado. A carteira é derivada da origem.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionInput"
            example:
              transaction:
                description: "Aluguel"
                value: 150000
                kind: withdraw
                transaction_date: "2026-07-06"
                source_type: Account
                source_id: "00000000-0000-0000-0000-000000000000"
      responses:
        "201":
          description: Transação criada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Transaction"
        "422":
          description: Origem não encontrada ou dados inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /transactions/{id}:
    get:
      tags: [Transactions]
      summary: Obter transação
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Dados da transação
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Transaction"
        "422":
          description: Transação não encontrada (inexistente ou de carteira sem acesso)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      tags: [Transactions]
      summary: Atualizar transação
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionInput"
      responses:
        "200":
          description: Transação atualizada
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Transaction"
        "422":
          description: Transação não encontrada ou dados inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags: [Transactions]
      summary: Remover transação (soft delete)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Transação removida com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "422":
          description: Transação não encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /transactions/{id}/settle:
    post:
      tags: [Transactions]
      summary: Efetivar transação
      description: Marca a transação como efetivada ("efetivado em"). Aceita `settled_at` opcional; sem ele, usa o instante atual.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                settled_at:
                  type: string
                  format: date-time
                  description: Data/hora da efetivação (default - agora)
      responses:
        "200":
          description: Transação efetivada
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Transaction"
        "422":
          description: Transação não encontrada ou dados inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /transactions/{id}/unsettle:
    post:
      tags: [Transactions]
      summary: Desfazer efetivação
      description: Volta a transação para pendente (limpa `settled_at`).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Efetivação desfeita
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Transaction"
        "422":
          description: Transação não encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
