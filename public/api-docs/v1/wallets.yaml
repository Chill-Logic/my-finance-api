openapi: "3.0.3"

info:
  title: My Finance API — Wallets
  version: "1.0.0"
  description: |
    API REST do My Finance.
    ## Autenticação
    X-API-Key: <token> + Authorization: Bearer <token>

servers:
  - url: /v1
    description: Backend atual (mesma origem desta documentação)

tags:
  - name: Wallets
    description: Carteiras financeiras — acessíveis via vínculo aceito (`user_wallets`); ações de dono exigem `owner_id` igual ao usuário autenticado

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

  schemas:
    Wallet:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: "Minha Carteira"
        owner_id:
          type: string
          format: uuid
        total:
          type: integer
          description: Saldo em centavos (depósitos - saques)
          example: 475000
        discarded_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    WalletInput:
      type: object
      required: [wallet]
      properties:
        wallet:
          type: object
          required: [name]
          properties:
            name:
              type: string
              example: "Viagem"

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: "Mensagem de erro"

    MessageResponse:
      type: object
      properties:
        message:
          type: string
          example: "Operação realizada com sucesso!"

security:
  - bearerAuth: []
    apiKeyAuth: []

paths:

  /wallets:
    get:
      tags: [Wallets]
      summary: Listar carteiras acessíveis
      description: Retorna as carteiras que o usuário autenticado pode acessar (vínculo aceito), paginadas.
      parameters:
        - name: terms
          in: query
          required: false
          schema:
            type: string
          description: Busca textual por nome (insensível a acentos)
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          required: false
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Lista paginada de carteiras
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Wallet"
                  total_count:
                    type: integer
                  total_pages:
                    type: integer
    post:
      tags: [Wallets]
      summary: Criar carteira
      description: Cria uma carteira com o usuário autenticado como dono. O vínculo do dono (`user_wallet` aceito) é criado automaticamente.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WalletInput"
      responses:
        "201":
          description: Carteira criada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Wallet"
        "422":
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /wallets/main:
    get:
      tags: [Wallets]
      summary: Obter carteira principal
      description: Retorna a carteira principal (`main_user_wallet`) do usuário autenticado.
      responses:
        "200":
          description: Carteira principal
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Wallet"
        "422":
          description: Carteira principal não encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /wallets/{id}:
    get:
      tags: [Wallets]
      summary: Obter carteira
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Dados da carteira
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Wallet"
        "422":
          description: Carteira não encontrada (inexistente ou sem acesso)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      tags: [Wallets]
      summary: Atualizar carteira
      description: Apenas o dono da carteira pode atualizar.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WalletInput"
      responses:
        "200":
          description: Carteira atualizada
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Wallet"
        "403":
          description: Usuário não é o dono da carteira
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Carteira não encontrada ou dados inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags: [Wallets]
      summary: Remover carteira (soft delete)
      description: Apenas o dono da carteira pode remover. A exclusão é lógica (`discarded_at`).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Carteira removida com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "403":
          description: Usuário não é o dono da carteira
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Carteira não encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
