services:
  redis:
    image: redis:7.0-alpine
    command: --port 6379
    ports:
      - '6379:6379'
  web:
    build: .
    command: bash -c "rm -f tmp/pids/server.pid && bundle exec rails s -p 3000 -b '0.0.0.0'"
    stdin_open: true
    tty: true
    volumes:
      - .:/my-finance-api
    ports:
      - "3000:3000"
    depends_on:
      - redis
    env_file:
      - .env
    environment:
      - DOCKERIZED=true
      - LAUNCHY_DRY_RUN=true
      - BROWSER=/dev/null
      - TZ=America/Sao_Paulo
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.rails.rule=Host(`${LETSENCRYPT_HOST}`)"
      - "traefik.http.routers.rails.entrypoints=websecure"
      - "traefik.http.routers.rails.tls.certresolver=myle"
      - "traefik.http.services.rails.loadbalancer.server.port=3000"

networks:
  default:
    name: traefik